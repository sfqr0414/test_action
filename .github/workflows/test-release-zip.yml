name: Test ZIP Upload & Restore
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 1. 生成 100MB 小文件（<2GB）
      - name: Create small file
        run: dd if=/dev/zero of=small.img bs=1M count=100

      # 2. 生成 3GB 大文件（>2GB）
      - name: Create large file
        run: dd if=/dev/zero of=large.img bs=1M count=3072

      # 3. 打包 ZIP
      - name: Zip files
        run: |
          zip small.zip small.img
          zip large.zip large.img

      # 4. 上传小文件（不分卷）
      - name: Upload small zip
        uses: sfqr9414/release-upload-zip@v1
        with:
          zip_path: small.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      # 5. 上传大文件（自动分卷）
      - name: Upload large zip
        uses: sfqr9414/release-upload-zip@v1
        with:
          zip_path: large.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      # 6. 下载还原小文件
      - name: Restore small zip
        id: restore-small
        uses: sfqr9414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: small.zip
          github_token: ${{ github.token }}

      # 7. 下载还原大文件
      - name: Restore large zip
        id: restore-large
        uses: sfqr9414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: large.zip
          github_token: ${{ github.token }}

      # 8. 输出结果
      - name: Show status
        run: |
          echo "small_restore_status: ${{ steps.restore-small.outputs.status }}"
          echo "large_restore_status: ${{ steps.restore-large.outputs.status }}"
