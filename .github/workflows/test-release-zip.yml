name: Test ZIP Upload & Restore (Final)
on: workflow_dispatch

jobs:
  test_zip_flow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create working directories
        run: |
          mkdir -p source restore invalid_test
        shell: bash

      - name: Generate test raw files
        run: |
          dd if=/dev/urandom of=source/small.raw bs=1G count=1
          dd if=/dev/urandom of=source/large.raw bs=3G count=1
        shell: bash

      - name: Package to zip files
        run: |
          zip -j source/small.zip source/small.raw
          zip -j source/large.zip source/large.raw
        shell: bash

      - name: Upload small zip to release
        uses: sfqr0414/release-upload-zip@v1
        with:
          zip_path: source/small.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      - name: Upload large zip to release
        uses: sfqr0414/release-upload-zip@v1
        with:
          zip_path: source/large.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      - name: Clean restore directory
        run: |
          if [ -d "restore" ]; then
            rm -rf restore/*
          fi
        shell: bash

      - name: Restore small zip
        id: restore_small
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: restore/small.zip
          unzip: true
          output_dir: restore
          github_token: ${{ github.token }}

      - name: Restore large zip
        id: restore_large
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: restore/large.zip
          unzip: true
          output_dir: restore
          github_token: ${{ github.token }}

      - name: Test invalid zip name
        id: restore_invalid
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: "/"
          github_token: ${{ github.token }}

      - name: List restore files
        run: |
          ls -lh restore/
        shell: bash

      - name: Compare SHA256 hash (small)
        run: |
          sha256sum source/small.raw > source_small.sha256
          sha256sum restore/small.raw > restore_small.sha256
          diff source_small.sha256 restore_small.sha256
          echo "Small hash compare result: $?"
        shell: bash

      - name: Compare SHA256 hash (large)
        run: |
          sha256sum source/large.raw > source_large.sha256
          sha256sum restore/large.raw > restore_large.sha256
          diff source_large.sha256 restore_large.sha256
          echo "Large hash compare result: $?"
        shell: bash

      - name: Show small restore status
        run: |
          echo "Small restore status: ${{ steps.restore_small.outputs.status }}"
        shell: bash

      - name: Show large restore status
        run: |
          echo "Large restore status: ${{ steps.restore_large.outputs.status }}"
        shell: bash

      - name: Show invalid parse status
        run: |
          echo "Invalid parse status: ${{ steps.restore_invalid.outputs.status }}"
        shell: bash

      - name: List all files
        run: |
          ls -lh source/ restore/ invalid_test/
        shell: bash
