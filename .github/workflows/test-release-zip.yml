name: Test ZIP Upload & Restore
on: workflow_dispatch

jobs:
  test_zip_flow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create working directories
        run: |
          mkdir -p source restore invalid_test
        shell: bash

      - name: Generate and zip files in parallel
        run: |
          {
            dd if=/dev/urandom of=source/small.raw bs=1G count=1
            zip -j source/small.zip source/small.raw
          } &
          {
            dd if=/dev/urandom of=source/large.raw bs=1G count=6
            zip -j source/large.zip source/large.raw
          } &
          wait
        shell: bash

      - name: Upload small zip to release
        uses: sfqr0414/release-upload-zip@v1
        with:
          zip_path: source/small.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      - name: Upload large zip to release
        uses: sfqr0414/release-upload-zip@v1
        with:
          zip_path: source/large.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      - name: Clean restore directory
        run: |
          if [ -d "restore" ]; then
            rm -rf restore/*
          fi
        shell: bash

      - name: Restore small zip
        id: restore_small
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: small.zip
          unzip: true
          output_dir: restore
          github_token: ${{ github.token }}

      - name: Restore large zip
        id: restore_large
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: large.zip
          unzip: true
          output_dir: restore
          github_token: ${{ github.token }}

      - name: Test invalid zip name
        id: restore_invalid
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: "/"
          github_token: ${{ github.token }}

      - name: List restore files
        run: |
          ls -lh restore/
        shell: bash

      - name: Compare files (small)
        run: |
          if ! cmp -s source/small.raw restore/small.raw; then
            echo "::error::Small files differ"
            exit 1
          fi
          echo "Small files identical"
        shell: bash

      - name: Compare files (large)
        run: |
          if ! cmp -s source/large.raw restore/large.raw; then
            echo "::error::Large files differ"
            exit 1
          fi
          echo "Large files identical"
        shell: bash

      - name: Show small restore status
        run: |
          echo "Small restore status: ${{ steps.restore_small.outputs.status }}"
        shell: bash

      - name: Show large restore status
        run: |
          echo "Large restore status: ${{ steps.restore_large.outputs.status }}"
        shell: bash

      - name: Show invalid parse status
        run: |
          echo "Invalid parse status: ${{ steps.restore_invalid.outputs.status }}"
        shell: bash

      - name: List all files
        run: |
          ls -lh source/ restore/ invalid_test/
        shell: bash
