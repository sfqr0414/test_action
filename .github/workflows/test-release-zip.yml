name: Test ZIP Upload & Restore
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create small raw file
        run: dd if=/dev/urandom of=small.raw bs=1G count=1
        shell: bash

      - name: Create large raw file
        run: dd if=/dev/urandom of=large.raw bs=1G count=3
        shell: bash

      - name: Zip files
        run: |
          zip small.zip small.raw
          zip large.zip large.raw
        shell: bash

      - name: Validate zip sizes
        run: |
          size_small=$(stat -c %s small.zip)
          size_large=$(stat -c %s large.zip)
          [ $size_small -ge 2147483648 ] && exit 1
          [ $size_large -lt 2147483648 ] && exit 1
        shell: bash

      - name: Upload small zip
        uses: sfqr0414/release-upload-zip@v1
        with:
          zip_path: small.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      - name: Upload large zip
        uses: sfqr0414/release-upload-zip@v1
        with:
          zip_path: large.zip
          release_tag: test-v1
          github_token: ${{ secrets.GHCR_PAT }}

      - name: Clean local files
        run: rm -rf *.raw *.zip *.part-*
        shell: bash

      - name: Restore small zip
        id: restore_small
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: small.zip
          github_token: ${{ github.token }}

      - name: Restore large zip
        id: restore_large
        uses: sfqr0414/release-restore-zip@v1
        with:
          release_tag: test-v1
          zip_name: large.zip
          github_token: ${{ github.token }}

      - name: Show small restore status
        if: steps.restore_small.outputs.status == '1'
        run: echo "small_restore_status: success"
        shell: bash

      - name: Show large restore status
        if: steps.restore_large.outputs.status == '1'
        run: echo "large_restore_status: success"
        shell: bash

      - name: List files
        if: steps.restore_small.outputs.status == '1' && steps.restore_large.outputs.status == '1'
        run: ls -lh *.zip
        shell: bash
