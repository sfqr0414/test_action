name: 构建纯官方 Ubuntu 26.04 arm64 桌面镜像（Orange Pi 5 Max）
run-name: ${{ github.actor }} - 纯官方 Ubuntu 26.04 桌面构建

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: 安装构建依赖工具
        run: |
          sudo apt update -y
          sudo apt install -y mmdebstrap qemu-user-static binfmt-support parted dosfstools e2fsprogs rsync curl xz-utils udev

      - name: 定义全局环境变量
        run: |
          echo "DISTRO=resolute" >> $GITHUB_ENV
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "ROOTFS=rootfs" >> $GITHUB_ENV
          echo "IMG=ubuntu-26.04-desktop-arm64-opi5max.img" >> $GITHUB_ENV
          echo "MIRROR=http://ports.ubuntu.com/ubuntu-ports" >> $GITHUB_ENV

      - name: 构建 Ubuntu 26.04 arm64 基础 rootfs
        run: |
          sudo mmdebstrap \
            --variant=minbase \
            --architectures=${{ env.ARCH }} \
            --components=main,restricted,universe,multiverse \
            --aptopt='-y' \
            --include=sudo,systemd-sysv,openssh-server,network-manager,iproute2,ca-certificates,nano,apt \
            ${{ env.DISTRO }} \
            ${{ env.ROOTFS }} \
            ${{ env.MIRROR }}

      - name: 准备chroot环境并执行系统初始化配置
        run: |
          sudo cp /usr/bin/qemu-aarch64-static ${{ env.ROOTFS }}/usr/bin/
          sudo mount -t proc proc ${{ env.ROOTFS }}/proc
          sudo mount -t sysfs sys ${{ env.ROOTFS }}/sys
          sudo mount -o bind /dev ${{ env.ROOTFS }}/dev
          sudo mount -o bind /dev/pts ${{ env.ROOTFS }}/dev/pts

          sudo tee ${{ env.ROOTFS }}/etc/apt/sources.list <<-'EOF'
            deb http://ports.ubuntu.com/ubuntu-ports resolute main restricted universe multiverse
            deb http://ports.ubuntu.com/ubuntu-ports resolute-updates main restricted universe multiverse
            deb http://ports.ubuntu.com/ubuntu-ports resolute-security main restricted universe multiverse
            deb http://ports.ubuntu.com/ubuntu-ports resolute-backports main restricted universe multiverse
          EOF

          sudo tee ${{ env.ROOTFS }}/tmp/setup.sh <<-'EOF'
            #!/bin/bash
            set -xe

            echo "root:orangepi" | chpasswd
            useradd -m -s /bin/bash ubuntu
            usermod -aG sudo ubuntu
            echo "ubuntu:orangepi" | chpasswd

            echo "ubuntu-opi5max" > /etc/hostname
            echo "127.0.1.1 ubuntu-opi5max" >> /etc/hosts

            systemctl enable ssh

            apt update -y
            apt upgrade -y

            apt install -y linux-image-generic linux-firmware
            apt install -y ubuntu-desktop
            apt install -y language-pack-zh-hans fcitx5 fcitx5-chinese-addons

            KERNEL_VER=$(dpkg -l | awk '/linux-image.*arm64/ {print $2}' | sed 's/linux-image-//' | head -n1)
            ln -sf /boot/vmlinuz-${KERNEL_VER} /boot/vmlinuz
            ln -sf /boot/initrd.img-${KERNEL_VER} /boot/initrd.img

            apt autoremove -y
            apt clean
          EOF

          sudo chmod +x ${{ env.ROOTFS }}/tmp/setup.sh
          sudo chroot ${{ env.ROOTFS }} /bin/bash -x /tmp/setup.sh
          sudo rm -f ${{ env.ROOTFS }}/tmp/setup.sh

      - name: 卸载chroot相关文件系统
        run: |
          sudo umount ${{ env.ROOTFS }}/dev/pts
          sudo umount ${{ env.ROOTFS }}/dev
          sudo umount ${{ env.ROOTFS }}/sys
          sudo umount ${{ env.ROOTFS }}/proc

      - name: 创建空镜像并进行GPT分区
        run: |
          dd if=/dev/zero of=${{ env.IMG }} bs=1G count=8
          sudo parted ${{ env.IMG }} mklabel gpt
          sudo parted ${{ env.IMG }} mkpart boot fat32 0% 512MB
          sudo parted ${{ env.IMG }} mkpart root ext4 512MB 100%
          sudo parted ${{ env.IMG }} set 1 boot on
          sudo parted ${{ env.IMG }} set 1 esp on

      - name: 格式化分区并写入rootfs生成可启动镜像
        run: |
          LOOP=$(sudo losetup -f --show ${{ env.IMG }})
          sudo partprobe ${LOOP}
          udevadm settle

          sudo mkfs.vfat -F32 -n BOOT ${LOOP}p1
          sudo mkfs.ext4 -L ROOT ${LOOP}p2

          sudo mkdir -p /mnt/img
          sudo mount ${LOOP}p2 /mnt/img
          sudo mkdir -p /mnt/img/boot
          sudo mount ${LOOP}p1 /mnt/img/boot

          sudo rsync -a ${{ env.ROOTFS }}/ /mnt/img/

          sudo mkdir -p /mnt/img/boot/extlinux
          sudo tee /mnt/img/boot/extlinux/extlinux.conf <<-'EOF'
            DEFAULT ubuntu
            LABEL Ubuntu 26.04 ARM64
            KERNEL /vmlinuz
            INITRD /initrd.img
            APPEND root=LABEL=ROOT rw rootfstype=ext4 console=ttyS2,1500000 console=tty0 quiet splash
          EOF

          sync
          sudo umount /mnt/img/boot /mnt/img
          sudo losetup -d ${LOOP}

      - name: 压缩镜像文件
        run: |
          xz -z -T0 ${{ env.IMG }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-26.04-desktop-arm64-opi5max
          path: "*.img.xz"
          retention-days: 7
